<body>
    <script>
        function NumSort(arr) {
            let obj = {};
            arr.map(item => {
                if(obj[item]) obj[item]+=1;
                else obj[item] = 1
            })
            let sortArr = Object.keys(obj).sort((a,b) =>  obj[a] - obj[b] )
            let res = [];
            for(let i = 0; i < sortArr.length; i++) {
                for(let j=0; j < obj[sortArr[i]]; j++) {
                    res.push(sortArr[i])
                }
            }
            console.log(res);
            return res
        }
        
        NumSort([1,2,2,3,4,4])
    </script>
</body>
