    <script>
        // 自己写的 84ms
        var isAnagram = function(s, t) {
            let arr1 = s.split(''),
            arr2 = t.split(''),
            flag = null;
            if(arr1.length !== arr2.length) {
                return; 
            }
            for (let i = 0; i < arr1.length; i++) {
                for (let j = 0; j < arr2.length; j++) {
                    if (arr2[j] == arr1[i]) {
                        arr2.splice(j,1);
                        break;
                    } 
                }
            }
            return arr2.length==0 ? true : false;
        };
        console.log(isAnagram('acr', 'car'))
