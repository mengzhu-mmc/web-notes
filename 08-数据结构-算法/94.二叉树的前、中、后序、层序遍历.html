      function fn(root) {
        const res = [],
          stack = [];
        while (root !== null || stack.length) {
          while (root) {
            res.push(root.val);
            stack.push(root);
            root = root.left;
          }

          const curr = stack.pop();
          root = curr.right;
        }
      }

      function fn2(root) {
        const res = [],
          stack = [];
        while (root !== null || stack.length) {
          while (root) {
            stack.push(root);
            root = root.left;
          }
          const current = stack.pop();
          res.push(current.val);
          root = current.right;
        }
        return res;
      }

      function fn3(root) {
        const res = [],
          stack = [];
        while (root !== null || stack.length) {
          while (root) {
            stack.push(root);
            res.unshift(root.val);
            root = root.right;
          }

          const current = stack.pop();
          root = current.left;
        }
        return res;
      }

      function inorderTraversal3(root) {
        // 初始化数据
        const res = [];
        const stack = [];
        while (root || stack.length) {
          while (root) {
            stack.push(root);
            res.unshift(root.val);
            root = root.right;
          }
          const current = stack.pop();
          root = current.left;
        }
        return res;

      const levelOrder = (root) => {
        let queue = [],
          res = [];
        if (root) queue.push(root);
        while (queue.length) {
          let nextQueue = [],
            nowRes = [];
          while (queue.length) {
            root = queue.shift();
            nowRes.push(root.val);
            root.left && nextQueue.push(root.left);
            root.right && nextQueue.push(root.right);
          }
          queue = nextQueue;
          res.push(nowRes);
        }
        return res;
      };

            root.right && nextQueue.push(root.right);

          queue = nextQueue;
          res.push(nextRes);

        return res;
