<body>
    <script>
        function fn(n) {
            if(n == 1 || n == 2) return 1
            return fn(n-1)+fn(n-2)
        }

        function fn1(n, pre=1, prePre = 0) {
            if(n == 1) return pre
            return fn(n-1, pre+prePre, pre)
        }
        console.log(fn(6));
    </script>
