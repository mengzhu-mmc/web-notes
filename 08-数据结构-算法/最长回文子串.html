      function fn2(line) {
        if (line.length <= 1) return line.length;

        let maxLen = 0;
        for (let i = 0; i < line.length; i++) {
          let dp1 = getPsd(line, i, i);
          // console.log(dp1, i)
          let dp2 = getPsd(line, i, i + 1);
          maxLen = Math.max(maxLen, dp1, dp2);
        }

        function getPsd(s, l, r) {
          let res = "";
          while (l >= 0 && r < s.length) {
            if (s[l] === s[r]) {
              res = s.slice(l, r + 1);
              l--;
              r++;
            } else break;
          }
          return res.length;
        }
        console.log(maxLen);
      }
