        function removeDuplicates(arr) {
            if(arr.length <= 1) return arr
            let fast = slow = 1;
            while(fast < arr.length) {
                if(arr[fast] !== arr[fast-1]) {
                    arr[slow] = arr[fast]
                    ++slow;
                }
                ++fast
            }
            return arr
        }
        let arr = [0,0,1,1,1,2,2,3,3,4]
        console.log(removeDuplicates(arr));
