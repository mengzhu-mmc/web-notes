<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>伪类</title>
</head>
<body>
    <!-- 
         伪类：是添加到选择器的关键字，指定要选择的元素的特殊状态。
                可以在一个选择器中同时一起写多个伪类。

         伪元素：可被用于为一个元素的 特定部分 应用样式。。
                一个选择器中只能使用一个伪元素。
        
         常用伪类：
            :hover :active :visited  :disabled :enabled :checked :first-child :first-of-type :nth-child() :nth-of-type() :last-child :last-of-type :root

        常用伪元素：
            ::before ::after ::selection ::placeholder
     -->
</body>
</html>
