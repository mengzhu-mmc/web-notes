    <style>
        .container {
            overflow: hidden;
        }
        .wrap {
            width: 100%;background: lightcoral;
        }
        .wrap,.left,.right {
            float: left;
            height: 60px;
        }
        .main {
            margin: 0 100px 0 120px;
        }
        .left {
            width: 120px;
            margin-left: -100%;
            background: skyblue;
        }
        .right {
            width: 100px;
            margin-left: -100px;
            background: orange;
        }

    </style>
</head>

<body>
    <div class="container clearfix">
        <div class="wrap">
            <div class="main">
                main
            </div>
        </div>
        <div class="left">left</div>
        <div class="right">right</div>
    </div>
</body>
