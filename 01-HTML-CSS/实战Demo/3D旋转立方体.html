<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root, body {
            margin: 0;
            padding: 0;
            height: 100%;
        }
        .wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            margin-top: -75px;
            margin-left: -75px;
            width: 150px;
            height: 150px;
            transform-style: preserve-3d;
            animation: spin 5s linear infinite;
        }
        .front {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url(./img/faceeuro.png) no-repeat center center;
            transform:  translateZ(10px);
        }
        .middle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url(./img/backeuro.png) no-repeat center center;
        }
        .back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url(./img/backeuro.png) no-repeat center center;
            transform: rotateY(180deg);
        }

        @keyframes spin {
            0% {
                transform:  rotateY(0);
            } 
            100% {
                transform: rotateY(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="front"></div>
        <div class="middle" style="transform: translateZ(1px) ;"></div>
        <div class="middle" style="transform: translateZ(2px) ;"></div>
        <div class="middle" style="transform: translateZ(3px) ;"></div>
        <div class="middle" style="transform: translateZ(4px) ;"></div>
        <div class="middle" style="transform: translateZ(5px) ;"></div>
        <div class="middle" style="transform: translateZ(6px) ;"></div>
        <div class="middle" style="transform: translateZ(7px) ;"></div>
        <div class="middle" style="transform: translateZ(8px) ;"></div>
        <div class="middle" style="transform: translateZ(9px) ;"></div>
        <div class="back"></div>
    </div>
</body>
</html>
