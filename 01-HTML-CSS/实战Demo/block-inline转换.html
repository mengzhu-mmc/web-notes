<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .demo {
            /* position:relative 和 sticky 并不改变元素的display属性*/
            /* position:absolute 和 fixed 将元素转为 类似于 inline-block 的元素 */
            position: absolute;
            /* width: 100px; */
            height: 40px;
            line-height: 40px;
            background: skyblue;
        }
    </style>
</head>
<body>
    <span class="demo">456</span>
</body>
</html>
