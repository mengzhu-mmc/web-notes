<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        perspective: 900px;
      }
      .wrap {
        position: relative;
        margin: 100px auto;
        width: 300px;
        font-size: 30px;
        color: rgb(36, 169, 231);
        transition: all 1s;
        transform-style: preserve-3d;
      }
      .font,
      .back {
        position: absolute;
        width: 300px;
        height: 300px;
        line-height: 300px;
        text-align: center;
        border-radius: 50%;
        background-color: rgb(245, 144, 72);
        z-index: 0;
      }
      .back {
        transform: rotateY(180deg) translateZ(1px);
        z-index: -1;
        background-color: #fff000;
      }
      .wrap:hover {
        transform: rotateY(180deg);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="font">font</div>
      <div class="back">back</div>
    </div>
  </body>
</html>
