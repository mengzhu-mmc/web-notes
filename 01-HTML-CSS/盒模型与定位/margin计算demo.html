<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .father {
            width: 200px;
            background-color: aquamarine;
        }
        .son {
            margin: 0 20px;
            padding: 20px;
        }

        .outer {
            position: relative;
            width: 500px;
            height: 500px;
            background-color: brown;
        }
        .inner {
            position: absolute;
            margin: auto;
            top: 0;
            bottom: 0;
            left: 0;
            right: 0;
            width: 200px;
            height: 125px;
            background-color: coral;
        }

        .wrap {
            display: inline-block;
            background-color: coral;
        }

        .wrap>div {
            width: 200px;
            height: 200px;
        }
    </style>
</head>
<body>
    <!-- 
        pre元素是块级元素，但是只能包含文本或行内元素。
     -->
    <div class="father">
        <div class="son">峥嵘是不会散场，亦不会消亡</div>
    </div>
    <div class="outer">
        <div class="inner"></div>
    </div>
    <span class="wrap">
        <div></div>
        <div></div>
    </span>

</body>
</html>
