<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>opacity与层叠上下文</title>
    <style>
        /* .box背景 把 img 覆盖 */
        /* .box {
            background: orange;
        }
        .box img {
            position: relative;
            width: 600px;
            left: 100px;
            z-index: -1;
        } */

        .box {
            opacity: .5; /* 半透明元素具有层叠上下文， 层级低于 z-index为负 */
            background: orange;
        }
        .box img {
            position: relative;
            width: 600px;
            left: 100px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="../../assist/img/3.jpg" alt="">
    </div>
</body>
</html>
