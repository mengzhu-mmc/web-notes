<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body {
            margin: 0;
            padding: 0;
        }
        main {
            display: -webkit-flex;
            display: flex;
            flex-flow: row wrap;
            justify-content: flex-start;
        }
        main .wrap {
            /* flex属性是flex-grow, flex-shrink 和 flex-basis的简写 */
            flex: 0 0 auto;
        }
        .wrap {
            margin: 30px;
            width: 200px;
            height: 200px;
            background-color: coral;
            resize: both;
            overflow: hidden;
        }
        .wrap img {
            width: 100%;
            height: 100%;
            background-color: cornflowerblue;
        }
        .fill {
            object-fit: fill;
        }
        .contain {
            object-fit: contain;
        }
        .cover { 
            object-fit: cover;
        }
        .none { 
            object-fit: none; 
        }
        .scale-down { 
            object-fit: scale-down; 
        }
    </style>
</head>

<body>
    <!-- 
        object-fit属性，具体有5个值：
        .fill { object-fit: fill; }
        .contain { object-fit: contain; }
        .cover { object-fit: cover; }
        .none { object-fit: none; }
        .scale-down { object-fit: scale-down; }
     -->

     <!-- 
        每个属性值的具体含义如下（自己理解的白话文，官方释义见官网）：
        fill: 中文释义“填充”。默认值。替换内容拉伸填满整个content box, 不保证保持原有的比例。
        contain: 中文释义“包含”。保持原有尺寸比例。保证替换内容尺寸一定可以在容器里面放得下。因此，此参数可能会在容器内留下空白。
        cover: 中文释义“覆盖”。保持原有尺寸比例。保证替换内容尺寸一定大于容器尺寸，宽度和高度至少有一个和容器一致。因此，此参数可能会让替换内容（如图片）部分区域不可见。
        none: 中文释义“无”。保持原有尺寸比例。同时保持替换内容原始尺寸大小。
        scale-down: 中文释义“降低”。就好像依次设置了none或contain, 最终呈现的是尺寸比较小的那个。
      -->
    <main>
        <div class="wrap">
            <img src="1.jpg" title="无object-fit">
        </div> 
        <div class="wrap">
            <img src="1.jpg" class="fill" title="object-fit:fill">
        </div>       
        <div class="wrap">
            <img src="1.jpg" class="contain" title="object-fit:contain">
        </div>
        <div class="wrap">
            <img src="1.jpg" class="cover" title="object-fit:cover">
        </div>
        <div class="wrap">
            <img src="1.jpg" class="none" title="object-fit:none">
        </div>
        <div class="wrap">
            <img src="1.jpg" class="scale-down" title="object-fit:scale-down">
        </div>
    </main>
</body>

</html>
