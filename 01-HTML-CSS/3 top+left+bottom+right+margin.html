<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            position: relative;
            width: 200px;
            height: 200px;
            border: 1px solid red;
        }
        .child-box {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: skyblue;
            width: 100px;
            height: 100px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="child-box"> </div>
    </div>
</body>
</html>
