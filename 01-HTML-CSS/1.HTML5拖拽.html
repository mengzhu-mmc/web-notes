<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      #wrap {
        width: 198px;
        height: 66px;
        padding: 10px;
        border: 10px ridge rgb(32, 231, 231);
        text-align: center;
        line-height: 106px;
      }
    </style>
  </head>
  <body>
    <!-- ondragover 事件规定在何处放置被拖动的数据。 -->
    <!-- 默认地，无法将数据/元素放置到其他元素中。如果需要设置允许放置，我们必须阻止对元素的默认处理方式。 -->
    <div id="wrap" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <!-- 了使元素可拖动，把 draggable 属性设置为 true ： -->
    <!-- ondragstart 属性调用了一个函数，drag(event)，它规定了被拖动的数据。 -->
    <img
      id="drag"
      src="../w3school.gif"
      alt="w3school"
      draggable="true"
      ondragstart="drag(event)"
    />
    <script>
      function allowDrop(e) {
        e.preventDefault();
      }
      function drag(e) {
        // dataTransfer.setData() 方法设置被拖数据的数据类型和值
        // 在这个例子中，数据类型是 "Text"，值是可拖动元素的 id ("drag")。
        e.dataTransfer.setData("Text", e.target.id);
      }

      function drop(e) {
        /* 当放置被拖数据时，会发生 drop 事件。 */
        e.preventDefault();
        let data = e.dataTransfer.getData("Text");
        e.target.appendChild(document.getElementById(data));
      }
    </script>
  </body>
</html>
