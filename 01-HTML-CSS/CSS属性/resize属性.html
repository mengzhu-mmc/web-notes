<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .demo {
            width: 200px;
            height: 180px;
            background-color: coral;
            /* 允许用户调整大小 */
            resize: both;
            overflow: auto;
        }
    </style>
</head>
<body>
    <!-- 
        如果希望此属性生效，需要设置元素的 overflow 属性，值可以是 auto、hidden 或 scroll 
    -->
    <!-- 
        none	用户无法调整元素的尺寸。
        both	用户可调整元素的高度和宽度。
        horizontal	用户可调整元素的宽度。
        vertical	用户可调整元素的高度。
     -->
    <div class="demo">

    </div>
</body>
</html>
