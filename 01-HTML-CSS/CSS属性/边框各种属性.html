<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>各种边框属性</title>
    <style>
        div::selection {
            color: rgb(255, 255, 255);
            background-color: rgb(204, 51, 5);
        }
        div {
            float: left;
            margin: 20px;
            width: 300px;
            height: 60px;
            line-height: 60px;
            text-align: center;
        }
        .dotted {
            border: 5px dotted orange;
        }
        .dashed {
            border: 5px dashed red;
        }
        .solid {
            border: 6px solid blueviolet;
        }
        .double {
            border: 6px double rgb(11, 226, 172);
        }
        .groove {
            border: 20px groove rgb(22, 230, 245);
        }
        .ridge {
            border: 20px ridge rgb(9, 188, 243);
        }
        .inset {
            border: 20px inset #076ff7;
        }
        .outset {
            border: 20px outset rgb(183, 214, 8);
        }
    </style>
</head>
<body>
    <!-- 
        dotted: 定义一个点线边框

        dashed: 定义一个虚线边框

        solid: 定义实线边框

        double: 定义两个边框。 两个边框的宽度和 border-width 的值相同

        groove: 定义3D沟槽边框。效果取决于边框的颜色值

        ridge: 定义3D脊边框。效果取决于边框的颜色值

        inset:定义一个3D的嵌入边框。效果取决于边框的颜色值

        outset: 定义一个3D突出边框。 效果取决于边框的颜色值
     -->
     <div class="dotted">dotted</div>
     <div class="dashed">dashed</div>
     <div class="solid">solid</div>
     <div class="double">double</div>
     <div class="groove">groove</div>
     <div class="ridge">ridge</div>
     <div class="inset">inset</div>
     <div class="outset">outset</div>
</body>
</html>
