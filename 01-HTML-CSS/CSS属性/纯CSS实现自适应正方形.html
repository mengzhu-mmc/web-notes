<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,body,div {
            margin: 0;
            padding: 0;
        }
        .demo1 {
            width: 50vh;
            height: 50vh;
            background: skyblue;
        }

        .demo2 {
            position: relative;
            width: 100%;
            max-height: 600px;
            overflow: hidden;
            background: orange;
        }
        .demo2::after {
            content: '';
            display: block;
            margin-top: 100%;
        }
        .con {
            position: absolute;
            
        }
    </style>
</head>
<body>
    <!-- 方案一 -->
    <!-- CSS3 中新增了一组相对于可视区域百分比的长度单位 vw, vh, vmin, vmax。其中 vw 是相对于视口宽度百分比的单位，1vw = 1% viewport width， vh 是相对于视口高度百分比的单位，1vh = 1% viewport height；vmin 是相对当前视口宽高中 较小 的一个的百分比单位，同理 vmax 是相对当前视口宽高中 较大 的一个的百分比单位。 -->
    <div class="demo1">方案一</div>

    <!-- 方案二 -->
    <div class="demo2">
        <div class="con">方案二</div>
    </div>
</body>
</html>
