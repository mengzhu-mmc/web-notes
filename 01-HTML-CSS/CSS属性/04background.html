<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
        背景 相关属性：
            background-color
            background-image
            background-repeat
            background-position
            background-attachment

            background-size
            background-origin  //背景原点
            background-clip
     -->

     <!-- background-attachment背景关联 
         设置背景图像是否固定或者随着页面的其余部分滚动 
           scroll 背景图片随页面的其余部分滚动 
           fixed 背景图像是固定的 （常用） 
           inherit 指定 background-attachment 的设置应该从父元素继承 -->

    <!-- 
        background-clip 背景裁剪
            content-box:从内容区域之外开始裁剪（裁剪掉的是 内边距 和 边框区域）
            padding-box 从内边距区域之外开始裁剪 （裁剪掉的是边框区域）
            border-box 从边框线之外开始裁剪
      -->

      <!-- 
          复合属性：
            background: background-color background-image background-repeat background-attachment background-position ;
            background: red url(./img.jpg) no-repeat fixed center top
       -->
    </body>
</html>
