<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .demo1 {
            /* 文字的方向： right to left */
            direction: rtl;
        }
        .demo2 {
            /* 文字的方向： left to right */
            direction: ltr;
        }
    </style>
</head>
<body>
    <div class="demo1">赵客缦胡缨，吴钩霜雪明。</div>
    <div class="demo2">银鞍照白马，飒沓如流星。</div>
</body>
</html>
