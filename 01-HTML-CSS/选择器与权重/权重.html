<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div#demo {
            background: red !important;
        }
        #demo {
            width: 300px;
            height: 300px;
            /* 内联元素的权重比 id大，比 !important 小 */
            background: blue !important;
        }
    </style>
</head>
<body>
    <!-- 
        !important 虽然是无穷的，但是 !important + 其他的选择器 > !important
        
        权重相等，用后面的样式

        CSS权重进制在IE6为256，后来扩大到了65536

        
        !important                    无穷
        行内样式                       1000
        id                            100
        class类选择器/属性选择器/伪类     10
        标签选择器/伪元素                1
        通配符                          0
     -->
    <div id="demo" class="de"></div>
</body>
</html>
