<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filter与层叠上下文</title>
    <style>
        .box {
            filter: blur(5px);
            width: 800px;
            background: orange;
        }
        .box img {
            position: relative;
            width: 600px;
            left: 100px;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="box">
        <img src="../../assist/img/3.jpg" alt="">
    </div>
</body>
</html>
