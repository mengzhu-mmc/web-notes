    <style>
        .container {
            padding: 0 100px 0 120px;
            overflow: hidden;
        }
        .main, .left, .right {
            float: left;
            height: 60px;
        }
        .main {
            width: 100%;
            background: orange;
        }
        .left {
            position: relative;
            left: -120px;
            margin-left: -100%;
            width: 120px;
            background: skyblue;
        }
        .right {
            position: relative;
            right: -100px;
            width: 100px;
            margin-left: -100px;
            background: thistle;
        }

    </style>
</head>

<body>
    <div class="container clearfix">
        <div class="main">main</div>
        <div class="left">left</div>
        <div class="right">right</div>
    </div>
</body>
