<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .top {
            position: fixed;
            top: 0;
            width: 100%;
            height: 200px;
            background: orange;
        }
        .middle {
            position: fixed;
            top: 200px;
            width: 100%;
            bottom: 100px;
            background: skyblue;
        }
        .bottom {
            position: fixed;
            bottom: 0;width: 100%;
            height: 100px;
            background: tomato;
        }
    </style>
</head>
<body>
    <article>
        <div class="top"></div>
        <div class="middle"></div>
        <div class="bottom"></div>
    </article>
</body>
</html>
