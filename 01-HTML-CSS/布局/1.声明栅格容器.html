<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>栅格</title>
    <style>
        article {
            display: grid;/* 变成栅格容器  （独占一行）*/
            /* display: -moz-inline-grid; */ /* 不独占一行 */
            /* display: -ms-inline-grid; */
            width: 300px;
            height: 300px;
            border: 1px solid #450;
            grid-template-rows: repeat(3,1fr);
            grid-template-columns: repeat(3, 1fr);
        }
        div {
            padding: 10px;
            width: 100px;
            height: 100px;
            background-color: coral;
            background-clip: content-box;
            box-sizing: border-box;
            border: 1px solid rgb(3, 226, 255);
        }
    </style>
</head>
<body>
    <article class="article1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
        <!-- div{$@7}  div的内容从七开始-->
        <div>7</div>
        <div>8</div>
        <div>9</div>
    </article>
</body>
</html>
