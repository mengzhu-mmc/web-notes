  <body>
    <script>
      /**
       * 1. 触发时机
       *   useEffect：
       *      1.是在组件完成渲染之后(包括首次渲染和更新渲染)异步触发的。它不会阻塞组件的渲染过程。useEffect是非批量更新
       *
       *   useLayoutEffect`：是在浏览器执行绘制之前同步触发的。可以阻塞组件的渲染过程。useLayoutEffect是批量更新
       */
    </script>
