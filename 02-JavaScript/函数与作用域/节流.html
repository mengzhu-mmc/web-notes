      function throttle(fn, delay = 1000) {
        let start = new Date();
        return function (...args) {
          const current = new Date();
          if (current - start >= delay) {
            start = current;
            fn.apply(this, args);
          }
        };
      }

      function throttle2(fn, delay) {
        let start = new Date();
        return function () {
          const current = new Date();
          if (current - start >= delay) {
            start = current;
            fn.apply(this, argument);
          }
        };
      }
