<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function foo() {
            this.b = 100;
            return this.a
        }
        let fn = foo.bind({a: 1})
        fn() //1
        // new 会忽略bind的作用，即this的绑定，重新新建一个空的对象，并且其原型指向fn.prototype，而且如果return不是返回一个对象会忽略 并且 默认返回this对象
        console.log(new fn()) // {b:100}
    </script>
</body>
</html>
