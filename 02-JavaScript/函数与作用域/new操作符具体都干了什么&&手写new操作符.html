      function Person(name) {
        this.name = name;
        const obj1 = { name: this.name };
      }

      function myNew(fn, ...rest) {
        let obj = {};
        obj.__proto__ = fn.prototype;
        let res = fn.apply(obj, rest);
        return Object.prototype.toString.call(res) == "[object Object]"
          ? res
          : obj;
      }

      function myNew2(fn, ...rest) {
        let obj = {};
        obj.__proto__ = fn.prototype;
        let res = fn.apply(obj, rest);
        return Object.prototype.toString.call(res) === "[object Object]"
          ? res
          : obj;
      }
