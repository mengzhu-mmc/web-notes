<!DOCTYPE html>

    <title>BUG</title>

<body>
    <script>
        /* 
            instanceof 运算符用于检测构造函数的 prototype 属性是否出现在某个实例对象的原型链上
        */
        console.log(typeof null); //=> object
        console.log(null instanceof Object); //=> false
        
    </script>
</body>
