<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const box = document.getElementById("box");
      let distance = 0;
      const target = 500; // 目标位移 500px

      function move() {
        distance += 5; // 每帧移动 5px
        box.style.transform = `translateX(${distance}px)`;

        if (distance < target) {
          // 递归调用，浏览器会自动根据刷新率（如60Hz）安排下一次执行
          requestAnimationFrame(move);
        }
      }

      // 启动动画
      requestAnimationFrame(move);
    </script>
  </body>
</html>
