    <script>
        // 静态方法使用：在方法前加上static关键字。
        // 1、为什么使用静态方法：阻止方法被实例继承，类的内部相当于实例的原型，所有在类中直接定义的方法相当于在原型上定义方法，都会被类的实例继承，但是使用static静态方法定义的不会被实例继承
        // class User {
        //     static call() {
        //         console.log('hello');
        //     }
        // }
        // User.call() // hello
        // let u = new User()
        // u.call() // u.call is not a function

        // 用ES5 =>
        // function User() {  }

        // User.call = function() {
        //     console.log('hello');
        // }
        // User.call() // hello
        // let u = new User()
        // u.call() // u.call is not a function

    </script>
