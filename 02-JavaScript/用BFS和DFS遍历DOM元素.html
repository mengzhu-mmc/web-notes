      function deepTravalSal(node) {
        const nodes = [];
        const stack = [];
        if (node) {
          stack.push(node);
          while (stack.length) {
            const item = stack.pop();
            nodes.push(item);
            for (let i = item.children.length - 1; i >= 0; i--) {
              stack.push(item.children[i]);
            }
          }
        }
        return nodes;
      }

      function deepMap(node) {
        const nodes = [];
        const stack = [];
        console.log(node);
        if (node) {
          stack.push(node);
          while (stack.length) {
            const item = stack.shift();
            console.log(item, " --item");
            nodes.push(item);
            for (let i = 0; i <= item.children.length - 1; i++) {
              stack.push(item.children[i]);
            }
            console.log(stack, "---");
            console.log(nodes, "nodes---");
          }
        }
        return nodes;
      }
