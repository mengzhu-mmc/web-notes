<body>
    <script>
        // 求数组中的最大值
        // Math.max(n1, n2, n3, ..., nX)
        let arr = [1,2,3,4]
        // 方法一
        Math.max(...arr); // 4
        // 方法二
        Math.max.apply(null, arr)// 4
    </script>
