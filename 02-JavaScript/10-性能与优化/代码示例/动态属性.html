<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES6动态属性</title>
</head>

<body>
    <script>
        // 在ES5之前，如果属性名是个变量或者需要动态计算，则只能通过 对象[变量名] 的方式去访问。
        // var p = {
        //     name : '李四',
        //     age : 20
        // }
        // var attName = 'name';
        // console.log(p[attName]) //这里 attName表示的是一个变量名。  =>'李四'
        // console.log(p.attName) // => undefined


        // 而且这种动态计算属性名的方式 在字面量中 是无法使用的。
        // var attName = 'name';
        // var p = {
        //     attName: '李四', // 这里的attName是属性名，相当于各级p定义了属性名叫 attName的属性。
        //     age: 20
        // }
        // console.log(p[attName]) // undefined
        // console.log(p["attName"]) // => '李四' 
        // console.log(p.sttName) //=> '李四'

        // 在ES6中，把属性名用[ ]括起来，则括号中就可以引用提前定义的变量。
        var attName = 'name';
        var p = {
            [attName]: '李四', // 引用了变量attName。相当于添加了一个属性名为name的属性
            age: 20
        }
        console.log(p[attName], p['attName'], p.attName) // 李四  undefined undefined
    </script>
</body>

</html>
