      function clone(target, map = new Map()) {
        if (typeof target === "object" && target !== null) {
          const cloneTarget = Array.isArray(target) ? [] : {};
          if (map.get(target)) {
            return map.get(target);
          }
          map.set(target, cloneTarget);
          for (const key in target) {
            if (Object.hasOwnProperty.call(target, key)) {
              cloneTarget[key] = clone(target[key], map);
            }
          }
          return cloneTarget;
        } else {
          return target;
        }
      }

      function clone2(target, map = new Map()) {
        if (typeof target === "object" && target !== null) {
          const cloneRes = Array.isArray(target) ? [] : {};
          if (map.has(target)) {
            return map.get(target);
          }
          map.set(target, cloneRes);
          for (const key in target) {
            if (Object.hasOwnProperty.call(target, key)) {
              cloneRes[key] = clone2(target[key], map);
            }
          }
          return cloneRes;
        } else {
          return target;
        }
      }

      function deepClone3(obj, map = new Map()) {
        if (typeof obj === "object" && obj !== null) {
          if (map.has(obj)) {
            return map.get(obj);
          }
          const cloneRes = Array.isArray(obj) ? [] : {};
          map.set(obj, cloneRes);
          for (let key in obj) {
            if (obj.hasOwnProperty(key)) {
              cloneRes[key] = deepClone3(obj[key], map);
            }
          }
          return cloneRes;
        } else {
          return obj;
        }
      }

      a._self = a;
      console.time();
      let b = deepClone3(a);
