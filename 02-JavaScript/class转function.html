<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <script>
        // 将下面的代码转为普通构造函数的写法
        // class Example {
        //     constructor(name) {
        //         this.name = name
        //     }
        //
        //     func() {
        //         console.log(this.name)
        //     }
        // }

        // 'use strict';

        function Example(name) {
            // 如果没有通过new调用此函数，则报错
            if (!new.target) {
                throw new Error('')
            }
            this.name = name;
        }
        // 类中的方法不可遍历
        Object.defineProperty(Example.prototype, 'func', {
            value: function () {
                // 类中的方法不能被new
                if (new.target) {
                    throw new Error('')
                }
                console.log(this.name)
            },
            enumerable: false
        })
        const a = new Example('zs')
        for (const key in a) {
            console.log(key)
        }

    </script>
</body>
</html>
