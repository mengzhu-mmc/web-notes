<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="width: 3000px; height: 30px; background: skyblue;"></div>
    <script>
        // document.body.clientWidth ==> BODY对象宽度  
        // document.body.clientHeight ==> BODY对象高度  
        // document.documentElement.clientWidth ==> 可见区域宽度  
        // document.documentElement.clientHeight ==> 可见区域高度
        
        let bodyClientWidth = document.body.clientWidth
        let bodyClientHeight = document.body.clientHeight
        let documentClientWidth = document.documentElement.clientWidth
        let documentClientHeight = document.documentElement.clientHeight
        let logInfo = () => {
            // 四个值不会随着浏览器宽高变化而变化
            console.log(bodyClientWidth);
            console.log(bodyClientHeight);
            console.log(documentClientWidth);
            console.log(documentClientHeight);
        }
        window.onresize = logInfo
        logInfo()

      /*   window.onresize = ()=>{
            // innerheight 返回窗口的文档显示区的高度。
            // innerwidth 返回窗口的文档显示区的宽度。
            console.log(window.innerWidth,window.innerHeight)
        } */
    </script>
</body>
</html>
