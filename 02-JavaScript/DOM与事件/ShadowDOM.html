<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="hostElement">4564645664648</div>
    <script>
        let hostElement = document.getElementById('hostElement')
        // 创建 Shadow DOM
        let shadow = hostElement.attachShadow({mode: 'open'})

        // 给 Shadow DOM 添加文字
        shadow.innerHTML = '<p>我是由Shadow DOM创建的&lt;p&gt;元素，我的背景色是？</p>'
        // 添加 CSS， p 标签背景色变成黑色
        shadow.innerHTML += '<style>P{background: skyblue; color: #fff}</style>'
    </script>
    <!-- 
        可以被挂载的shadow DOM元素
        任何带有有效的名称且可独立存在的（autonomous）自定义元素：
            <article>
            <aside>
            <blockquote>
            <body>
            <div>
            <footer>
            <h1> (en-US)
            <h2> (en-US)
            <h3> (en-US)
            <h4> (en-US)
            <h5> (en-US)
            <h6> (en-US)
            <header>
            <main>
            <nav>
            <p>
            <section>
            <span>
     -->
</body>
</html>
