<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }
        #wrap {
            height: 50vh;
            border: 2px solid orange;
        }
        #list {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        #list li {
            font-size: 20px;
            line-height: 1.6;
            border-bottom: 1px solid orange;
            text-indent: 2em;
        }
    </style>
</head>
<body>
    <div id="wrap">
        <ul id="list"></ul>
    </div>
    <script>
        // 生成 list 的 inner
       { 
           let list = document.querySelector('#list')
        list.innerHTML = [...(".".repeat(30))].map((item,index)=> `<li>这是第${index}个li</li>`).join("")
        console.log(list.innerHTML);
    }
    
    // 在 wrap 中滑动list
    {    
        let wrap = document.querySelector("#wrap");
        let list = document.querySelector("#list");
        let startPointY = 0; 
        let startTranslateY = 0;
        let translateY = 0;
        wrap.addEventListener('touchstart', (e) => {
            startPointY = e.changedTouches[0].pageY
            startTranslateY = translateY
        })
        wrap.addEventListener('touchmove', (e) => {
            let nowPointY = e.changedTouches[0].pageY
            let disY = nowPointY - startPointY
            translateY = startTranslateY + disY
            list.style.transform = `translateY(${translateY}px)`
            e.preventDefault()
        })
    }
    </script>
</body>
</html>
