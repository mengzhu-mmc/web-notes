        function camel(data) {
            if (typeof data !== 'object' || !data) return data
            if (Array.isArray(data)) {
                return data.map(item => camel(item))
            }
            let newData = {}
            for(let key in data) {
                let newKey = key.replace(/_([a-z])/g, (p,m) => { console.log(p, m); m.toUpperCase()})
                newData[newKey] = camel(data[key])
            }
            return newData
        }

        function underline(data) {
            if (typeof data !== 'object' || !data) return data
            if (Array.isArray(data)) {
                return data.map(item => underline(item))
            }
            let newData = {}
            for(let key in data) {
                let newKey = key.replace(/([A-Z])/g, (p,m,a,b) => { // 小括号必须加
                   return "_"+ m.toLowerCase()
                })
                newData[newKey] = underline(data[key])
            }
            return newData
        }

        console.log(camel({
            first_name: "xiaoming",
            second_name: 'zhangsan'
        }));
        console.log(underline({
            firstName: "xiaoMing",
            secondName: 'zhangSan'
        }));
