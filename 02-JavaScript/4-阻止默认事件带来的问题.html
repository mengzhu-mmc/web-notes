    <script>
        document.addEventListener("touchstart",(e) => {
            // 默认不能再 document、body这些顶层元素中阻止默认事件，需要设置  passsive
            e.preventDefault()
        }, {
            passive: false
        })

        /* 
            阻止默认事件：
                start:
                    1.不允许双指缩放页面
                    2.阻止完默认事件之后，该元素及其子元素鼠标事件都会失效
                    3.输入框不能获取焦点
                    4.长按不能启动系统菜单
                    5.禁止滚动条滚动
                    ......
                move:
                    1.不允许双指缩放页面
                    2.禁止滚动条滚动
        */
