<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /**
       * 原码 、反码、补码 【为了解决计算机减法问题，因为计算机的运算器中只有加法器】
       *  1.原码：数字的二进制形式。 二进制首位为标志位，正数标志位为0， 负数标志为为1
       *        14： 00001110
       *        -14：10001110
       *        -21:10010101
       *
       *  2.反码：
       *      正数的原码、反码、补码相同，为原码本身
       *      负数的反码： 标志位不变，其他取反
       *       14： 00001110
       *      -21： 11101010
       *
       * 3. 补码：
       *    正数的原码、反码、补码相同，为原码本身
       *    负数的补码 = 反码+1
       *    -21： 11101011
       *
       * 计算机内计算方式：
       *  14+（-21） = -7
       *  补码 + 补码 -> 转为反码 -> 转为原码
       *
       * 负数在计算机中以补码的形式存在
       */

      /**
       *  1. 左移运算  <<  【符号位不参与移动】   m << n = m x 2^n
       *   -26 << 1 = -52
       *    -26原码： 10011010
       *    -26补码： 11100110
       *    左移结果：11001100
       *    结果转为原码： 10110100 = -52
       *
       *  2. 右移运算 >> 【证书右移， 左侧补0； 负数右移，左侧补1】 m >> n = m➗2^n； 有小数则向下取整
       *
       *  3. 无符号右移
       *   正数右移： 左侧补0 【与右移运算相同】
       *   负数右移动: 左侧补0
       */
    </script>
  </body>
</html>
