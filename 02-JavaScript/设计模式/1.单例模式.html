        // // 因为单体模式是只实例化一次，所以下面的实例是相等的

        class CreateUser {
            constructor(name) {
                this.name = name
            }
            getName() {
                return this.name
            }
        }

        const ProxyMode = (function() {
            let instance = null;
            return function(name) {
                if (!instance) {
                    instance = new CreateUser(name)
                }
                return instance
            }
        })()
        let a = new ProxyMode("aaa")
        let b = new ProxyMode("bbb")
        console.log(a === b);
