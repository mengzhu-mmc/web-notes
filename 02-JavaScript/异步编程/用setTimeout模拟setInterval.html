        function mySetInterval(fn, time=1000) {
            let timer = null, isClear = false;
            function interval() {
                if(isClear) {
                    isClear = false;
                    clearTimeout(timer);
                    return
                }
                fn()
                timer = setTimeout(interval, time)
            }
            timer = setTimeout(interval, time)
            return () => {
                isClear = true
            }
        }
        let cancel = mySetInterval(() => {
            console.log(222)
        }, 1000)

        setTimeout(() => { cancel() }, 7000)
