      // generator 自动执行 === ⚠注意---存疑

      function run(gen) {
        console.log("开始");
        const g = gen();

        function _next(value) {
          const res = g.next(value);
          if (res.done) {
            return res.value;
          }

          res.value.then((res) => {
            _next(res);
          });
        }

        _next();
      }

      function* myGenerator() {
        console.log(yield Promise.resolve(1)); //1
        console.log(yield Promise.resolve(2)); //2
        console.log(yield Promise.resolve(3)); //3
      }

      run(myGenerator);
