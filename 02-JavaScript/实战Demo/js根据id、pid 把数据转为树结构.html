        function tranListToTreeData(arr) {
            let res = [], map = new Map();
            arr.forEach((item, index) => {
                map[item.id] = item
            })
            arr.map((item, index) => {
                const parent = map[item.pid]
                if(parent) {
                    parent.children = parent.children || []
                    parent.children.push(item)
                } else {
                    res.push(item)
                }
            })
            return res
        }
