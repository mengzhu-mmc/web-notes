<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* reverse() 反转数组（改变原数组） */
        /* sort()    数组排序（改变原数组） */
        let a = [1,2,3,4],
            b = [3,2,4,1],
            res1 = a.reverse(),     
            res2 = b.sort();
        console.log(res1); //=> [4,3,2,1]
        console.log(res2); //=> [1,2,3,4]
    </script>
</body>
</html>
