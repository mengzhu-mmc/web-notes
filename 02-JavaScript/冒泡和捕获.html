<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #s1 {
            width: 300px;
            height: 300px;
            background: skyblue;
        }
        #s2 {
            width: 200px;
            height: 200px;
            background: tomato;
        }
    </style>
</head>
<body>
    <div id="s1">s1
        <div id="s2">s2</div>
    </div>
    <script>
        // addEventListener 第三个参数默认为false 表示在事件冒泡阶段调用事件处理函数;如果参数为true，则表示在事件捕获阶段调用处理函数。
        // s1.addEventListener("click",function(e){
        //     console.log("s1 冒泡事件");
        // },false);
        // s2.addEventListener("click",function(e){
        //     console.log("s2 冒泡事件");
        // },false);
        // ==> s2 冒泡事件
        // ==> s1冒泡事件

        // s1.addEventListener("click",function(e){
        //     console.log("s1 捕获事件");
        // },true);
        // s2.addEventListener("click",function(e){
        //     console.log("s2 捕获事件");
        // },true);
        // ==> s1 捕获事件
        // ==> s2 捕获事件

        // 当事件捕获和事件冒泡一起存在的情况，事件又是如何触发呢。
        // 这里记被点击的DOM节点为target节点
        // document 往 target节点，捕获前进，遇到注册的捕获事件立即触发执行
        // 到达target节点，触发事件（对于target节点上，是先捕获还是先冒泡则捕获事件和冒泡事件的注册顺序，先注册先执行）
        // target节点 往 document 方向，冒泡前进，遇到注册的冒泡事件立即触发
        s1.addEventListener("click",function(e){
            console.log("s1 冒泡事件");         
        },false);
        s2.addEventListener("click",function(e){
            console.log("s2 冒泡事件");
        },false);
                
        s1.addEventListener("click",function(e){
            console.log("s1 捕获事件");
        },true);
                
        s2.addEventListener("click",function(e){
            console.log("s2 捕获事件");
        },true);
//          s1 捕获事件
//         s2 捕获事件
// s2 冒泡事件
//  s1 冒泡事件
    </script>
</body>
</html>
