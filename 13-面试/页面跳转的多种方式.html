<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>页面跳转的多种方式</title>
</head>
<body>
    <!-- 第一种 -->
    <a href="www.baidu.com">百度</a>
    <div class="second">第二种跳转方法</div>
    <div class="third">第二种跳转方法</div>
    <script>
        // 第二种
        document.querySelector('.second').addEventListener('click', () => {
            window.location.href = "http://www.baidu.com"
        })

        // 第三种
        document.querySelector('.third').addEventListener('click', () => {
            /* 如果用window.location.replace("http://www.baidu.com") 实现跳转页面, 它和上面方法的区别在于它跳转后不会保存跳出页面的信息.
            所以如果使用 history 历史返回按钮是无效的 */
            window.location.replace("URL")
        })
        
    </script>
</body>
</html>
