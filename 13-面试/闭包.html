<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>

  <body>
    <script>
      /*
        闭包的定义：
          MDN对闭包的定义：闭包是指那些能够访问自由变量的函数
          自由变量是指在函数中使用的，但既不是函数参数又不是函数的局部变量的变量

          形成闭包的原因：
           内部的函数存在外部作用域的引用就会导致闭包。

          使用场景：
            变量私有、return 一个函数（节流、防抖）

          注意事项：
            容易导致内存泄漏
       
       */

      // 经典面试题： 循环中使用闭包解决 'var'定义函数的问题
      // for (var i = 1; i <= 5; i++) {
      //   setTimeout(function timer() {
      //     console.log(i)
      //   }, i * 1000)
      // }

      // 第一种： 使用闭包
      // for(var i = 1; i <= 5; i++) {
      //     (function(i) {
      //         setTimeout(function timer() {
      //             console.log(i)
      //         }, i*1000)
      //     })(i)
      // }

      // 第二种：使用setTimeout的第三个参数，这个参数会被当成 timer 函数的参数传入
      // for(var i = 1; i <= 5; i++) {
      //     setTimeout(function timer(j) {
      //         console.log(j)
      //     }, i*1000, i)
      // }

      // 第三种：使用let (推荐)
      // for (let i = 1; i <= 5; i++) {
      //   setTimeout(function timer() {
      //     console.log(i)
      //   }, i * 1000)
      // }

      // 面试题-较难
      var result = [];
      var a = 3;
      var total = 0;

      function foo(a) {
        for (var i = 0; i < 3; i++) {
          result[i] = function () {
            total += i * a;
            console.log(total);
          };
        }
      }

      foo(1);
      result[0](); // 3
      result[1](); // 6
      result[2](); // 9
    </script>
  </body>
</html>
