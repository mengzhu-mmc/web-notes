      function add(a, b) {
        const lengthDifference = String(a).length - String(b).length;
        const restStr = new Array(Math.abs(lengthDifference)).fill(0).join("");
        lengthDifference > 0 ? (b = restStr + b) : (a = restStr + a);
        const aArr = String(a)
          .split("")
          .map((item) => +item);
        const bArr = String(b)
          .split("")
          .map((item) => +item);
        let sign = 0;
        const res = [];
        while (aArr.length) {
          const resItem = aArr.pop() + bArr.pop() + sign;
          if (resItem >= 10) {
            sign = 1;
            res.unshift(resItem - 10);
          } else {
            sign = 0;
            res.unshift(resItem);
          }
        }
        return res.join("");
      }
