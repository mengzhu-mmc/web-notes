  <!-- 观察者模式 -->
  <script>
    class Subject {
      constructor() {
        this.observers = []
      }

      add(observer) {
        this.observers.push(observer)
      }

      notify() {
        this.observers.forEach(observer => {
          observer.update()
        })
      }
      remove(observer) {
        this.observers = this.observers.fill(item => item!==observer)
      }
    }

    class Observer {
      constructor(name) {
        this.name = name
      }
      update() {
        console.log('my name is ' + this.name);
      }
    }

    const sub = new Subject()
        const obs1 = new Observer('zs')
        const obs2 = new Observer('lisi')
        sub.add(obs1)
        sub.add(obs2)
        sub.notify()
