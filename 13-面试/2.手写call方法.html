      Function.prototype.myCall1 = function (ctx) {
        if (typeof this !== "function") {
          return false;
        }
        ctx = ctx || window;
        let fn = Symbol();
        ctx[fn] = this;
        let arg = [...arguments].slice(1);
        let res = ctx[fn](...arg);
        delete ctx[fn];
        return res;
      };

      let obj = {
        name: "zhangsan",
      };
      function foo() {
        console.log(this);
        console.log(arguments);
      }
      foo.myCall1(obj, "aaa", "bbb");
