<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const vnode = {
        tag: "DIV",
        attrs: {
          id: "app",
        },
        children: [
          {
            tag: "SPAN",
            children: [
              {
                tag: "A",
                children: [],
              },
            ],
          },
          {
            tag: "SPAN",
            children: [
              {
                tag: "A",
                children: [],
                attrs: {
                  value: "hh",
                  text: "hh",
                },
              },
              {
                tag: "A",
                children: [],
              },
            ],
          },
        ],
      };

      function render(vnode) {
        const main = (node, parent = null) => {
          let ele = document.createElement(node.tag.toLowerCase());
          if (node.attrs) {
            for (const key in node.attrs) {
              if (Object.hasOwnProperty.call(node.attrs, key)) {
                ele.setAttribute(key, node.attrs[key]);
              }
            }
          }
          if (node.children?.length) {
            for (const val of node.children) {
              main(val, ele);
            }
          }
          if (parent) {
            parent.appendChild(ele);
          } else {
            parent = ele;
          }
          return parent;
        };
        let dom = main(vnode);
        return dom;
      }
      function render2(vnode) {
        const main = (node, parent = null) => {
          const { tag, attrs, children } = node;
          let ele = document.createElement(tag.toLowerCase());

          if (attrs) {
            for (const key in attrs) {
              if (Object.hasOwnProperty.call(attrs, key)) {
                ele.setAttribute(key, attrs[key]);
              }
            }
          }

          if (children) {
            for (const value of children) {
              main(value, ele);
            }
          }

          if (parent) {
            parent.appendChild(ele);
          } else {
            parent = ele;
          }
          return parent;
        };
        return main(vnode, null);
      }
      console.log(render2(vnode));
    </script>
  </body>
</html>
