      // 演示地址；https://p3-juejin.byteimg.com/tos-cn-i-k3u1fbpfcp/bb98997eab974429a6189c5f0c58f1c8~tplv-k3u1fbpfcp-zoom-in-crop-mark:1512:0:0:0.awebp?
      function bubbleSort(arr) {
        let temp = 0;

        for (let i = 0; i < arr.length - 1; i++) {
          let hasChange = false;
          for (let j = 0; j < arr.length - i - 1; j++) {
            if (arr[j] > arr[j + 1]) {
              hasChange = true;
              let temp = arr[j];
              arr[j] = arr[j + 1];
              arr[j + 1] = temp;
            }
          }
          if (!hasChange) break;
        }
      }

      function sort(arr) {
        let temp = 0;
        for (let i = 0; i < arr.length; i++) {
          for (let j = i + 1; j < arr.length; j++) {
            if (arr[i] > arr[j]) {
              temp = arr[i];
              arr[i] = arr[j];
              arr[j] = temp;
            }
          }
        }
        return arr;
      }

      const quickSort = (arr) => {
        if (arr.length <= 1) {
          return arr;
        }
        const midIdex = Math.floor(arr.length / 2);
        const midVal = arr.splice(midIdex, 1);
        const leftArr = [],
          rightArr = [];
        arr.forEach((item) => {
          if (item > midVal) {
            rightArr.push(item);
          } else {
            leftArr.push(item);
          }
        });
        return quickSort(leftArr).concat(midVal, quickSort(rightArr));
      };
