        class EventEmitter {
          constructor() {
            this.events = {}
          }

          on(type,  callBack) {
            if (!this.events[type]) {
              this.events[type] = [callBack];
              return
            }
            this.events.push(callBack)
          }

          off(type, callBack) {
            this.events[type] = this.events[type].filter(item => item!==callBack)
          }

          once(type, callBack) {
            function fn() {
              callBack()
              this.off(type, fn)
            }
            this.on(type, fn)
          }

          emit(type, ...rest) {
            this.events[type].forEach(fn => {
              fn(rest)
            });
          }
        }

        // 使用如下
        const event = new EventEmitter();

        const handle = (...rest) => {
            console.log(this);
           console.log(rest);
        };

        event.on("click", handle);

        event.emit("click", 1, 2, 3, 4);

        event.off("click", handle);

        event.emit("click", 1, 2);

        event.once("dbClick", () => {
            console.log(this);
            console.log(123456);
        });
        event.emit("dbClick");
        event.emit("dbClick");
