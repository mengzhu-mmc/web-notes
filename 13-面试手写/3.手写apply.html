        Function.prototype.myApply = function(ctx, rest) {
            if(typeof this !== 'function') {
                console.error(this + 'must be a function');
                return false
            }
            if(!Array.isArray(rest)) {
                console.error(rest + 'must be a Array')
                return false
            }
            const fn = Symbol()
            ctx[fn] = this
            const res = ctx[fn](...rest)
            delete ctx[fn]
            return res
        }
        
        let obj = {
            name: 'zhangsan'
        }

            console.log(this);
            console.log(arguments);
        }
