  <body>
    <script>
      // 给定一个二维数组，其每一行从左到右递增排序，从上到下递增排序。给定一个数，判断这个数是否在该二维数组中。
      function search(array, target) {
        let col = array[0].length;
        let row = array.length;
        let i = 0,
          j = col - 1;
        while (j >= 0 && i < row) {
          let curr = array[i][j];
          if (curr == target) {
            return true;
          } else if (curr > target) {
            j--;
          } else {
            i++;
          }
        }
        return false;
      }
      let arr = [
        [1, 2, 8, 9],
        [2, 4, 9, 12],
        [4, 7, 10, 13],
        [6, 8, 11, 15],
      ];
      console.log(search(arr, 3));
    </script>
  </body>
