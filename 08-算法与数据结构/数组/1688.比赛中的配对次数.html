    <script>
        /**
         * @param {number} n
         * @return {number}
         */
        var numberOfMatches = function (n) {
            let sum = 0;
            while(n>=2) {
                sum += Math.floor(n / 2);
                n = n % 2 == 0 ? n/2 : (Math.floor(n / 2)+1) ;
            } 
            return sum
        }
    </script>
