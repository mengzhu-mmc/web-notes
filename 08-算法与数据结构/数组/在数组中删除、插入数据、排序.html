<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const arr = [1,3,5,2,4];
        // 从数组中删除某些数
        // 从索引为1的数开始，删除两个
        arr.splice(1,2); // arr=> [1,2,4]

        // 我们想把数字 8 9 插入数组里， 放到之前删除元素的位置上， 可以再次使用splice
        arr.splice(1,0, 8,9);
        console.log(arr); // arr=> [1,8,9,2,4]

        // 对象排序
        const friends = [
            {
                name: 'zhangsan',
                age: 18
            },
            {
                name: 'lisi',
                age: 19
            },{
                name: 'zhangsi',
                age: 17
            }
        ]
        friends.sort(function(a, b) {
            return a.age - b.age
        })
        // console.log(friends); //=>
        // 0: {name: 'zhangsi', age: 17}
        // 1: {name: 'zhangsan', age: 18}
        // 2: {name: 'lisi', age: 19}

        // 字符串排序
        const names = ['Ana', 'ana', 'john', 'John'];
        // JS在做字符比较的时候，根据字符对象的 ASCII 值来比较。
        // A、J、a、j的ASCII值分别是65 75 91 106
        // console.log(names.sort()); //=> ['Ana', 'John', 'ana', 'john']

        // 如果给sort 传入一个忽略大小写的比较函数，将会输出 ['Ana', 'ana', 'john', 'John']
        names.sort(function(a,b) {
            console.log(a,b);
            if (a.toLowerCase() < b.toLowerCase()){ 
                console.log(1);
                return -1 
            } 
            if (a.toLowerCase() > b.toLowerCase()){ 
                console.log(2);
                return 1 
            } 
            console.log(3);
            return 0; 
        }) 
        console.log(names);
    </script>
</body>
</html>
