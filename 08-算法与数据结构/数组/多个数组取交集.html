      // => 优化一下：
      function intersectNoRepeatTwice(arr) {
        if (arr.length <= 1) return arr;

        let set = new Set(arr[0]);

        for (let i = 1; i < arr.length; i++) {
          const tempArr = new Set([]);

          for (let item of arr[i]) {
            if (set.has(item)) {
              tempArr.add(item);
            }
          }

          if (tempArr.length == 0) {
            set = tempArr;
            break;
          }

          set = tempArr;
        }

        return Array.from(set);
      }

      var arr1 = [1, 3, 5, 6, 4, 3, 2];
      var arr2 = [8, 32, 5, 1, 76, 3, 2];
      var arr3 = [3, 8, 5, 65, 32, 3, 2];
      var resultArr = intersectNoRepeatTwice([arr1, arr2, arr3]);
