        function generate(n) {
            let res = []
            for(let i = 0; i < n; i++) {
                res[i] = new Array(i+1).fill(1)
                for(let j = 1; j < i; j++) {
                    res[i][j] = res[i-1][j-1] + res[i-1][j]
                }
            }
            return res
        }
        console.log(generate(4));
