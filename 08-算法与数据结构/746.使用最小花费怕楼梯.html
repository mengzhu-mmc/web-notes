        var minCostClimbingStairs = function (cost) {
            let cLen = cost.length;
            if(cLen < 2) return 0
            let pre = 0, cur = 0
            for(i = 2; i <= cLen; i++) {
                let next = Math.min(pre + cost[i-2], cur + cost[i-1])
                pre = cur;
                cur = next;
            }
            return cur
        }

        console.log(minCostClimbingStairs([10,15,20]));
