<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 给定一个字符串，找出其中第一个出现一次的字符
      function unique(str) {
        for (let i = 0; i < str.length; i++) {
          let curr = str.chartAt(i);
          //以下判断条件还可以替代为：str.indexOf(curr) === str.lastIndexOf(item => item === curr)
          if (str.indexOf(curr) == i && str.indexOf(curr, i + 1) == -1) {
            return curr;
            break;
          } else {
            continue;
          }
        }
        return null;
      }
    </script>
  </body>
</html>
