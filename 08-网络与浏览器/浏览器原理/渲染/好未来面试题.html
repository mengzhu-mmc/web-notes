    <!-- 
        1.页面空白的原因：
                script脚本阻塞DOM渲染
                直接使用<script>，html会按照顺序来加载并执行脚本。
                在脚本加载和执行的过程中，会阻塞后续的DOM渲染。

            解决方法：
                使用<script>元素的async或defer属性
                    
            defer:
                这个属性的用途是表明脚本在执行时不会影响页面的构造。也就是说，脚本会被延迟到整个页面都解析完毕后再运
            行。因此，在<script>元素中设置defer属性，相当于告诉浏览器立即下载，但延迟执行。HTML5规范要求脚本按照它们出现的先后顺序执行，因此第一个延迟脚本会先于第二个延迟脚本执行，而这两个脚本会先于DOMContentLoaded事件执行。
            async:
                只适用于外部脚本文件，并告诉浏览器立即下载文件。但与defer不同的是，标记为async的脚本并不保证按照它
            们的先后顺序执行。第二个脚本文件可能会在第一个脚本文件之前执行。因此确保两者之间互不依赖非常重要。指定async属性的目的是不让页面等待两个脚本下载和执行，从而异步加载页面其他内容。s

         2.使用link和@import有什么区别？
              （1）link属于XHTML标签，除了加载CSS外，还能用于定义RSS, 定义rel连接属性等作用；而@import是CSS提供的，只能用于加载CSS;
            （2）页面被加载的时，link会同时被加载，而@import引用的CSS会等到页面被加载完再加载;
      -->
</body>
</html>
