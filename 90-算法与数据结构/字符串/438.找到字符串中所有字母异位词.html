<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /**
      给定两个字符串 s 和 p，找到 s 中所有 p 的 异位词 的子串，返回这些子串的起始索引。不考虑答案输出的顺序。

      输入: s = "cbaebabacd", p = "abc"
      输出: [0,6]
      解释:
      起始索引等于 0 的子串是 "cba", 它是 "abc" 的异位词。
      起始索引等于 6 的子串是 "bac", 它是 "abc" 的异位词。

     **/
      var findAnagrams = function (s, p) {
        const sLen = s.length,
          pLen = p.length;
        if (sLen < pLen) return [];

        const ans = [];
        const sCount = new Array(26).fill(0);
        const pCount = new Array(26).fill(0);
        const aCode = "a".charCodeAt();
        for (let i = 0; i < pLen; i++) {
          sCount[s[i].charCodeAt() - aCode]++;
          pCount[p[i].charCodeAt() - aCode]++;
        }

        if (sCount.toString() === pCount.toString()) {
          ans.push(0);
        }

        for (let i = 0; i < sLen - pLen; i++) {
          sCount[s[i].charCodeAt() - aCode]--;
          sCount[s[i + pLen].charCodeAt() - aCode]++;

          if (sCount.toString() === pCount.toString()) {
            ans.push(i + 1);
          }
        }

        return ans;
      };
      // 优化版
      var findAnagrams4 = function (s, p) {
        const sLen = s.length,
          pLen = p.length;
        if (sLen < pLen) return [];
        const count = new Array(26).fill(0);
        const aCode = "a".charCodeAt();
        const ans = [];

        for (let i = 0; i < pLen; i++) {
          count[s[i].charCodeAt() - aCode]++;
          count[p[i].charCodeAt() - aCode]--;
        }

        let differ = 0;

        count.forEach((item) => {
          if (item !== 0) {
            differ++;
          }
        });

        if (differ === 0) {
          ans.push(0);
        }

        for (let i = 0; i < sLen - pLen; i++) {
          if (count[s[i].charCodeAt() - aCode] === 1) {
            differ--;
          } else if (count[s[i].charCodeAt() - aCode] === 0) {
            differ++;
          }
          count[s[i].charCodeAt() - aCode]--;

          if (count[s[i + pLen].charCodeAt() - aCode] === 0) {
            differ++;
          } else if (count[s[i + pLen].charCodeAt() - aCode] === -1) {
            differ--;
          }
          count[s[i + pLen].charCodeAt() - aCode]++;

          console.log(count, differ);
          if (differ === 0) {
            ans.push(i + 1);
          }
        }
        return ans;
      };

      console.log(findAnagrams4("cbaebabacd", "abc"));
    </script>
  </body>
</html>
